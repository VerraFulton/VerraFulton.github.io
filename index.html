<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Chelsea Cobras U9s</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #222;
    }
    header {
        background: #ffcc00;
        padding: 20px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        color: #003366;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .hero {
        background: #003366;
        height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 36px;
        font-weight: bold;
    }
    .section {
        padding: 30px;
        text-align: center;
    }
    .section h2 {
        color: #003366;
        font-size: 28px;
        margin-bottom: 10px;
    }
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        padding: 20px;
    }
    .gallery img {
        width: 100%;
        border-radius: 10px;
        border: 4px solid #ffcc00;
    }
    footer {
        background: #003366;
        color: white;
        text-align: center;
        padding: 15px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>Chelsea Cobras U9s</header>

<div class="hero">Play • Grow • Shine</div>

<div class="section">
    <h2>Photo Gallery</h2>
    <p>Our boys in action!</p>
    <div class="gallery">
        <img src="photos/DSC_0314.JPG">
        <img src="photos/DSC_0315.JPG">
        <img src="photos/DSC_0318.JPG">
        <img src="photos/DSC_0324.JPG">
        <img src="photos/DSC_0325.JPG">
        <img src="photos/DSC_0326.JPG">
    </div>
</div>

<footer>
    © 2026 Vizavee
</footer>

</body>
</html>
