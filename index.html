<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> Chelsea Cobras U9s</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #222;
    }
    header {
        background: #ffcc00;
        padding: 20px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        color: #003366;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .hero {
        background: #003366;
        height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 36px;
        font-weight: bold;
    }
    .section {
        padding: 30px;
        text-align: center;
    }
    .section h2 {
        color: #003366;
        font-size: 28px;
        margin-bottom: 10px;
    }
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        padding: 20px;
    }
    .gallery img {
        width: 100%;
        border-radius: 10px;
        border: 4px solid #ffcc00;
    }
    footer {
        background: #003366;
        color: white;
        text-align: center;
        padding: 15px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>Chelsea Cobras U9s</header>

<div class="hero">Play • Grow • Shine</div>

<div class="section">
    <h2>Photo Gallery</h2>
    <p>Our boys in action!</p>
<div class="gallery" id="gallery"></div>

<script>
  // Automatically load every image in the /photos folder
  const gallery = document.getElementById("gallery");

  // List every filename here — add as many as you want
  const images = [
    "DSC_0314.JPG",
    "DSC_0315.JPG",
    "DSC_0324.JPG",
    "DSC_0325.JPG",
    "DSC_0326.JPG",
    "DSC_0331.JPG",
    "DSC_0332.JPG",
    //"DSC_0335.JPG",
    "DSC_0336.JPG",
    //"DSC_0338.JPG",
    "DSC_0341.JPG",
    "DSC_0342.JPG",
    "DSC_0348.JPG",
    "DSC_0349.JPG",
    "DSC_0350.JPG",
    "DSC_0351.JPG",
    "DSC_0355.JPG",
    "DSC_0357.JPG",
    "DSC_0360.JPG",
    "DSC_0361.JPG",
    "DSC_0367.JPG",
    "DSC_0368.JPG",
    "DSC_0372.JPG",
    "DSC_0374.JPG",
    "DSC_0375.JPG",
    "DSC_0378.JPG",
    "DSC_0379.JPG"
  ];

  images.forEach(file => {
    const img = document.createElement("img");
    img.src = "photos/" + file;
    gallery.appendChild(img);
  });
</script>
</div>

<footer>
    © 2026 Vizavee
</footer>

</body>
</html>
