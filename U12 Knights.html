<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chelsea Knights U12s</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        color: #222;
    }
    header {
        background: #ffcc00;
        padding: 20px;
        text-align: center;
        font-size: 32px;
        font-weight: bold;
        color: #003366;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .section {
        padding: 30px;
        text-align: center;
    }
    .section h2 {
        color: #003366;
        font-size: 28px;
        margin-bottom: 10px;
    }
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
        padding: 20px;
    }
    .gallery img {
        width: 100%;
        border-radius: 10px;
        border: 4px solid #ffcc00;
        object-fit: cover;
    }
    a.back {
        display: inline-block;
        margin-top: 20px;
        font-size: 18px;
        color: #003366;
        text-decoration: none;
        font-weight: bold;
    }
</style>
</head>

<body>

<header>Chelsea Knights U12s</header>

<div class="section">
    <h2>Happy Snaps!</h2>
    <p>Another collection of great moments!</p>

    <div class="gallery" id="gallery2"></div>

    <a class="back" href="index.html">← Back to Home</a>
</div>

<script>
  const gallery2 = document.getElementById("gallery2");

  // CLEANED + CORRECTED FILENAMES
  const album2 = [
    "DSC_0188.JPG",
    "DSC_0194.JPG",
    "DSC_0195.JPG",
    "DSC_0198.JPG",
    "DSC_0223.JPG",
    "DSC_0225.JPG",
    "DSC_0233.JPG",
    "DSC_0234.JPG",
    "DSC_0238.JPG",
    "DSC_0243.JPG",
    "DSC_0246.JPG",
    "DSC_0248.JPG",
    "DSC_0249.JPG",
    "DSC_0251.JPG",
    "DSC_0260.JPG",
    "DSC_0275.JPG",
    "DSC_0289.JPG",
    "DSC_0290.JPG",
    "DSC_0293.JPG",
    "DSC_0296.JPG",
    "DSC_0303.JPG",
    "DSC_0304.JPG"
  ];

  // THUMBNAILS + DOWNLOAD LINKS
  album2.forEach(file => {
    const link = document.createElement("a");
    link.href = "album2/" + file;   // full-size download
    link.download = file;

    const img = document.createElement("img");
    img.src = "photos/Chelsea U12 Knights/" + file;     // displayed small
    img.loading = "lazy";
    img.style.width = "150px";

    link.appendChild(img);
    gallery2.appendChild(link);
  });
</script>

</body>
</html>
